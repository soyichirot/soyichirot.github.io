<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ドット絵キャンバス</title>

<style>
body{
  margin:0;
  display:flex;
  font-family:sans-serif;
}

#ui{
  width:340px;
  padding:10px;
  background:#eee;
}

button{margin:2px;}

canvas{
  border:1px solid #aaa;
  /* 透明部分がわかりやすいようにチェック柄の背景を設定 */
  background-image: linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%),
                    linear-gradient(45deg, #ccc 25%, #fff 25%, #fff 75%, #ccc 75%);
  background-size: 20px 20px;
  background-position: 0 0, 10px 10px;
  image-rendering:pixelated;
  touch-action:none;
}
</style>
</head>

<body>

<div id="ui">

<button onclick="setTool('pen')">ペン</button>
<button onclick="setTool('eraser')">消しゴム</button>
<button onclick="setTool('bucket')">塗りつぶし</button>
<button onclick="clearFrame()">絵を全部消す</button>

<br><br>

<input type="color" id="color" value="#000000">

<br><br>

オニオンスキン濃さ<br>
<input type="range" id="ghost" min="0" max="100" value="50">
<span id="ghostVal">50%</span>

<br><br>

<button onclick="addFrame()">フレームを増やす</button>
<button onclick="deleteFrame()">フレームを削除</button>
<button onclick="copyFrame()">フレームをコピー</button>

<br><br>

<button onclick="downloadPNG()">PNG保存</button>
<button onclick="exportGIF()">GIF保存</button>

<br><br>

<button onclick="play()">GIFを再生</button>
<button onclick="stop()">GIFを停止</button>

<br><br>

<div id="frameList"></div>

</div>

<canvas id="canvas"></canvas>

<!-- GIF生成ライブラリ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

<script>

const SIZE = 32;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = SIZE;
canvas.height = SIZE;
canvas.style.width = "320px";
canvas.style.height = "320px";

ctx.imageSmoothingEnabled = false;

/* =====================
   状態
===================== */
let tool = "pen";
let frames = [];
let currentFrame = 0;
let drawing = false;
let timer = null;

/* =====================
   初期化
===================== */
frames.push(newFrame());
render();
updateUI();

/* =====================
   フレーム（初期背景は透明にします）
===================== */
function newFrame(){
  const c = document.createElement("canvas");
  c.width = SIZE;
  c.height = SIZE;
  return c;
}

/* =====================
   ツール
===================== */
function setTool(t){
  tool = t;
}

/* =====================
   座標
===================== */
function getPos(e){
  const r = canvas.getBoundingClientRect();
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const y = e.touches ? e.touches[0].clientY : e.clientY;

  return {
    x: Math.floor((x - r.left) / (r.width / SIZE)),
    y: Math.floor((y - r.top) / (r.height / SIZE))
  };
}

/* =====================
   描画
===================== */
function draw(e){
  const p = getPos(e);
  if (p.x < 0 || p.x >= SIZE || p.y < 0 || p.y >= SIZE) return;

  const f = frames[currentFrame];
  const cx = f.getContext("2d");

  if(tool === "eraser"){
    // 消しゴムは白で塗るのではなく透明にクリアする
    cx.clearRect(p.x, p.y, 1, 1);
  }
  else if(tool === "bucket"){
    floodFill(p.x, p.y);
    return;
  }
  else{
    cx.fillStyle = document.getElementById("color").value;
    cx.fillRect(p.x, p.y, 1, 1);
  }

  render();
}

/* =====================
   バケツ（透明色にも対応）
===================== */
function floodFill(x,y){
  const f = frames[currentFrame];
  const cx = f.getContext("2d");

  const img = cx.getImageData(0,0,SIZE,SIZE);
  const d = img.data;

  const i0 = (y*SIZE+x)*4;
  // アルファ値（透明度）も含めて判定
  const target = {r:d[i0], g:d[i0+1], b:d[i0+2], a:d[i0+3]};
  const fill = hex(document.getElementById("color").value);
  fill.a = 255; // 塗りつぶす色は不透明

  if(eq(target, fill)) return;

  const stack=[[x,y]];

  while(stack.length){
    const [cx,cy]=stack.pop();
    if(cx<0||cy<0||cx>=SIZE||cy>=SIZE) continue;

    const i=(cy*SIZE+cx)*4;
    const cur={r:d[i], g:d[i+1], b:d[i+2], a:d[i+3]};

    if(!eq(cur,target)) continue;

    d[i]=fill.r;
    d[i+1]=fill.g;
    d[i+2]=fill.b;
    d[i+3]=fill.a;

    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }

  cx.putImageData(img,0,0);
  render();
}

function hex(h){
  const n=parseInt(h.slice(1),16);
  return {r:(n>>16)&255, g:(n>>8)&255, b:n&255};
}

function eq(a,b){
  // 色とアルファ値が一致しているか
  return a.r===b.r && a.g===b.g && a.b===b.b && a.a===b.a;
}

/* =====================
   入力
===================== */
canvas.addEventListener("mousedown",e=>{drawing=true;draw(e);});
canvas.addEventListener("mousemove",e=>{if(drawing)draw(e);});
canvas.addEventListener("mouseup",()=>drawing=false);

canvas.addEventListener("touchstart",e=>{drawing=true;draw(e);});
canvas.addEventListener("touchmove",e=>{if(drawing){draw(e);e.preventDefault();}});
canvas.addEventListener("touchend",()=>drawing=false);

/* =====================
   フレーム操作
===================== */
function addFrame(){
  frames.push(newFrame());
  currentFrame=frames.length-1;
  updateUI();
  render();
}

function deleteFrame(){
  if(frames.length<=1) return;
  frames.splice(currentFrame,1);
  currentFrame=Math.max(0,currentFrame-1);
  updateUI();
  render();
}

function copyFrame(){
  const c=newFrame();
  c.getContext("2d").drawImage(frames[currentFrame],0,0);
  frames.splice(currentFrame+1,0,c);
  currentFrame++;
  updateUI();
  render();
}

function clearFrame(){
  frames[currentFrame]=newFrame();
  render();
}

/* =====================
   🧅輪郭オニオン（描画処理）
===================== */
function render(){
  // メインキャンバスを一旦クリア
  ctx.clearRect(0,0,SIZE,SIZE);

  const ghost=document.getElementById("ghost").value/100;

  // 前のフレームを「赤」、後ろのフレームを「緑」のシルエットで描画
  if(currentFrame > 0){
    drawGhost(frames[currentFrame-1], "red", ghost);
  }
  if(currentFrame < frames.length - 1){
    drawGhost(frames[currentFrame+1], "lime", ghost);
  }

  // 現在のフレームを描画
  ctx.globalAlpha=1;
  ctx.drawImage(frames[currentFrame],0,0);
}

function drawGhost(frame,color,alpha){
  if(!frame) return;

  const img=frame.getContext("2d").getImageData(0,0,SIZE,SIZE).data;

  ctx.globalAlpha=alpha;
  ctx.fillStyle=color;

  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      const i=(y*SIZE+x)*4;
      // 不透明なピクセル（ドットが打たれている場所）があればシルエット化
      if(img[i+3]>0){
        ctx.fillRect(x,y,1,1);
      }
    }
  }
}

/* =====================
   UI
===================== */
document.getElementById("ghost").addEventListener("input",e=>{
  document.getElementById("ghostVal").innerText=e.target.value+"%";
  render();
});

/* =====================
   PNG
===================== */
function downloadPNG(){
  const a=document.createElement("a");
  a.href=canvas.toDataURL();
  a.download="pixel.png";
  a.click();
}

/* =====================
   GIF
===================== */
function exportGIF(){
  const gif=new GIF({
    workers:2,
    quality:10,
    width:SIZE,
    height:SIZE,
    transparent: '#00000000' // 透明背景のGIFエクスポートに対応
  });

  frames.forEach(f=>{
    // GIF用に背景が透過された状態のままフレームを追加
    gif.addFrame(f,{delay:200});
  });

  gif.on("finished",blob=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="pixel.gif";
    a.click();
  });

  gif.render();
}

/* =====================
   再生
===================== */
function play(){
  stop();
  let i=currentFrame;

  timer=setInterval(()=>{
    currentFrame=i%frames.length;
    render();
    updateUI();
    i++;
  },200);
}

function stop(){
  clearInterval(timer);
}

/* =====================
   UI更新
===================== */
function updateUI(){
  const list=document.getElementById("frameList");
  list.innerHTML="";

  frames.forEach((_,i)=>{
    const b=document.createElement("button");
    b.textContent="F"+(i+1);

    if(i===currentFrame){
      b.style.background="red";
      b.style.color="#fff";
    }

    b.onclick=()=>{
      currentFrame=i;
      render();
      updateUI();
    };

    list.appendChild(b);
  });
}

</script>

</body>
</html>
